[run]
repo = "."
max_rounds = 2
commit_on_success = false
create_branch = true
branch_prefix = "codex/devloop"
require_clean_worktree = true
artifact_dir = ".devloop/runs"
timeout_secs = 1800

[agents.implementer]
name = "claude"
command = ["claude", "-p"]
input_mode = "stdin"
cwd_mode = "repo"

[agents.auditor]
name = "codex"
command = ["codex", "exec"]
input_mode = "stdin"
cwd_mode = "snapshot"

[[checks.required]]
name = "tests"
command = "pytest -q"
timeout_secs = 900

[[checks.advisory]]
name = "lint"
command = "ruff check ."
timeout_secs = 300
